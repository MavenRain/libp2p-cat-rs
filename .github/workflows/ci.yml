name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  gauntlet:
    name: fmt + clippy + test + doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target/
        uses: Swatinem/rust-cache@v2

      # Cheapest gates first so a misformatted PR fails in seconds.
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy --all-targets --all-features -- -D warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test --all-features
        run: cargo test --all-features

      - name: cargo doc --no-deps --all-features (warnings as errors)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features
